services:
  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-south-1.amazonaws.com/backend:latest
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:5000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
