services:
  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-south-1.amazonaws.com/frontend:latest
    container_name: frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
