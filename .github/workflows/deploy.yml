name: Deploy Fullstack Docker App to EC2

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  BACKEND_REPOSITORY: backend
  FRONTEND_REPOSITORY: frontend
  IMAGE_TAG: latest

jobs:
  build-push-deploy:
    name: Build, Push to ECR, and Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build backend Docker image
        run: |
          docker build -t "$ECR_REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG" ./server

      - name: Build frontend Docker image
        run: |
          docker build --build-arg VITE_API_URL=/api -t "$ECR_REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG" ./client

      - name: Push backend image to ECR
        run: |
          docker push "$ECR_REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG"

      - name: Push frontend image to ECR
        run: |
          docker push "$ECR_REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            cd ~/dockerized-ecommerce-aws-devops &&
            git fetch origin main &&
            git reset --hard origin/main &&
            chmod +x deploy-ecr.sh &&
            ./deploy-ecr.sh
          '
