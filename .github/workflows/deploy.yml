# below is container in same ec2

name: Deploy Blog 3-Tier Docker App to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  FRONTEND_ECR_REPO: frontend
  BACKEND_ECR_REPO: backend
  FRONTEND_ASG_NAME: docker-frontend-asg
  BACKEND_ASG_NAME: docker-backend-asg
  VITE_API_BASE_URL: /api

jobs:
  detect-changes:
    name: Detect changed application folders
    runs-on: ubuntu-latest

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Detect frontend/backend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'client/**'
            backend:
              - 'server/**'

  deploy-frontend:
    name: Build, Push, and Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Docker to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        id: aws-account
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Set frontend image URI
        id: image
        run: |
          ACCOUNT_ID=${{ steps.aws-account.outputs.account_id }}
          FRONTEND_IMAGE=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_ECR_REPO }}
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }} \
            -t ${{ steps.image.outputs.frontend_image }}:latest \
            -t ${{ steps.image.outputs.frontend_image }}:${{ github.sha }} \
            ./client

      - name: Push frontend image to ECR
        run: |
          docker push ${{ steps.image.outputs.frontend_image }}:latest
          docker push ${{ steps.image.outputs.frontend_image }}:${{ github.sha }}

      - name: Start frontend ASG instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ env.FRONTEND_ASG_NAME }} \
            --preferences MinHealthyPercentage=50,InstanceWarmup=300 \
            --region ${{ env.AWS_REGION }}

  deploy-backend:
    name: Build, Push, and Deploy Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Docker to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        id: aws-account
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Set backend image URI
        id: image
        run: |
          ACCOUNT_ID=${{ steps.aws-account.outputs.account_id }}
          BACKEND_IMAGE=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_ECR_REPO }}
          echo "backend_image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build backend Docker image
        run: |
          docker build \
            -t ${{ steps.image.outputs.backend_image }}:latest \
            -t ${{ steps.image.outputs.backend_image }}:${{ github.sha }} \
            ./server

      - name: Push backend image to ECR
        run: |
          docker push ${{ steps.image.outputs.backend_image }}:latest
          docker push ${{ steps.image.outputs.backend_image }}:${{ github.sha }}

      - name: Start backend ASG instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ env.BACKEND_ASG_NAME }} \
            --preferences MinHealthyPercentage=50,InstanceWarmup=300 \
            --region ${{ env.AWS_REGION }}
